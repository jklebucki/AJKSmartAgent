global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    service_namespace: praxiara

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: jaeger
    static_configs:
      - targets:
          - jaeger:8888

  - job_name: seaweedfs
    static_configs:
      - targets:
          - seaweedfs:9327
